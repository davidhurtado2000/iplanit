<!--
  Supabase "Confirm signup" email template.
  Paste this into: Supabase Dashboard -> Authentication -> Email Templates -> Confirm signup
  {{ .ConfirmationURL }} is a Supabase template variable - leave it exactly as-is.
-->
<div style="background-color:#f4f5f7;padding:32px 16px;font-family:Helvetica,Arial,sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:480px;margin:0 auto;background-color:#ffffff;border-radius:12px;overflow:hidden;border:1px solid #e5e7eb;">
    <tr>
      <td style="padding:32px 32px 24px 32px;text-align:center;">
        <table role="presentation" cellpadding="0" cellspacing="0" style="margin:0 auto 16px auto;">
          <tr>
            <td style="width:40px;height:40px;background-color:#4f46e5;border-radius:8px;text-align:center;vertical-align:middle;font-size:20px;">
              📅
            </td>
          </tr>
        </table>
        <span style="font-size:20px;font-weight:700;color:#111827;">iPlanit</span>
      </td>
    </tr>
    <tr>
      <td style="padding:0 32px 8px 32px;">
        <h1 style="margin:0 0 12px 0;font-size:20px;font-weight:700;color:#111827;text-align:center;">
          ¡Bienvenido a iPlanit!
        </h1>
        <p style="margin:0 0 24px 0;font-size:14px;line-height:1.6;color:#4b5563;text-align:center;">
          Ya casi terminas. Confirma tu correo para activar tu cuenta y empezar a gestionar tus reservas.
        </p>
      </td>
    </tr>
    <tr>
      <td style="padding:0 32px 24px 32px;text-align:center;">
        <a href="{{ .ConfirmationURL }}"
           style="display:inline-block;background-color:#4f46e5;color:#ffffff;text-decoration:none;font-size:14px;font-weight:600;padding:12px 28px;border-radius:8px;">
          Confirmar mi cuenta
        </a>
      </td>
    </tr>
    <tr>
      <td style="padding:0 32px 8px 32px;">
        <p style="margin:0;font-size:12px;line-height:1.6;color:#9ca3af;text-align:center;">
          Si tú no creaste esta cuenta, puedes ignorar este correo.
        </p>
      </td>
    </tr>
    <tr>
      <td style="padding:24px 32px 32px 32px;border-top:1px solid #f3f4f6;">
        <p style="margin:16px 0 0 0;font-size:11px;line-height:1.6;color:#9ca3af;text-align:center;">
          ¿El botón no funciona? Copia y pega este enlace en tu navegador:<br>
          <a href="{{ .ConfirmationURL }}" style="color:#4f46e5;word-break:break-all;">{{ .ConfirmationURL }}</a>
        </p>
      </td>
    </tr>
  </table>
</div>
